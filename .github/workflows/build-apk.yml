name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f debug.keystore ]; then
            echo "debug.keystore already exists."
          else
            echo "Generating a new debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Assemble Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Installable APK
        uses: actions/upload-artifact@v4
        with:
          name: transit-wheel-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
